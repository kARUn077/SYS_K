<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYS_K - Tactical Ops</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --neon:#00ff66;
    --dark1:#000a03;
    --dark2:#011407;
}

body{
    min-height:100vh;
    overflow:hidden;
    color:var(--neon);
    font-family:'Share Tech Mono', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:#000a03;
}

/* BACKGROUND PHOTO */
.bg-photo{
    position:fixed;
    inset:0;
    background-image:url('ChatGPT Image Mar 1, 2026, 11_41_24 PM.png');
    background-size:cover;
    background-position:center;
    opacity:0.22;
    filter:grayscale(1) sepia(0.25) hue-rotate(85deg) saturate(1.4);
    z-index:1;
    pointer-events:none;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(0,255,102,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,102,0.06) 1px, transparent 1px);
    background-size:44px 44px;
    animation:gridMove 18s linear infinite;
    pointer-events:none;
}

@keyframes gridMove{
    from{transform:translateY(0);}
    to{transform:translateY(44px);}
}

/* SCANLINE */
.scanline{
    position:fixed;
    width:100%;
    height:2px;
    background:linear-gradient(90deg,transparent,rgba(0,255,102,0.9),transparent);
    box-shadow:0 0 15px rgba(0,255,102,0.9);
    animation:scan 5s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    from{top:-4px;}
    to{top:100%;}
}

/* MAIN WRAP */
.intro-wrap{
    width:min(92vw,720px);
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2rem;
}

/* HEADER */
.header{
    text-align:center;
    animation: fadeInUp 0.8s ease-out forwards;
    opacity:0;
}

.header h1{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(2.6rem,8vw,4.4rem);
    letter-spacing:0.35rem;
    color:#c8ffd8;
    text-shadow:
        0 0 12px rgba(0,255,102,0.8),
        0 0 30px rgba(0,255,102,0.4);
}

.header h2{
    margin-top:0.4rem;
    font-size:1.1rem;
    letter-spacing:0.12rem;
    opacity:0.9;
}

.version{
    font-size:0.8rem;
    opacity:0.65;
}

/* MENU */
.menu-box{
    width:100%;
    padding:1.8rem;
    border:1.5px solid rgba(0,255,102,0.7);
    background:rgba(0,25,10,0.5);
    backdrop-filter:blur(6px);
    box-shadow:
        0 0 25px rgba(0,255,102,0.25),
        inset 0 0 20px rgba(0,255,102,0.15);    position:relative;
}

/* HUD CORNER BRACKETS */
.menu-box::before,
.menu-box::after{
    content:"";
    position:absolute;
    width:35px;
    height:35px;
    border:2px solid var(--neon);
}

.menu-box::before{
    top:-1px;
    left:-1px;
    border-right:none;
    border-bottom:none;
    box-shadow:-3px -3px 12px rgba(0,255,102,0.4);
}

.menu-box::after{
    bottom:-1px;
    right:-1px;
    border-left:none;
    border-top:none;
    box-shadow:3px 3px 12px rgba(0,255,102,0.4);}

.menu-box h3{
    text-align:center;
    margin-bottom:1.2rem;
    font-family:'Orbitron', sans-serif;
    letter-spacing:0.15rem;
    font-weight:700;
    font-size:1.25rem;
}

.menu-list{
    display:flex;
    flex-direction:column;
    gap:0.8rem;
}

.menu-item{
    border:1px solid rgba(0,255,102,0.6);
    padding:0.85rem 1.2rem;
    background:rgba(0,255,102,0.05);
    text-decoration:none;
    color:var(--neon);
    transition:all 0.25s ease;
    font-family:'Orbitron', sans-serif;
    letter-spacing:0.08rem;
    font-size:1.15rem;
    font-weight:700;
}

.menu-item:hover{
    background:rgba(0,255,102,0.9);
    color:#001106;
    box-shadow:0 0 18px rgba(0,255,102,0.7);
    transform:translateX(6px);
}

.menu-btn{
    cursor:pointer;
}

/* FOOTER */
.menu-box h3{
    animation: fadeInUp 0.8s ease-out 0.5s forwards;
    opacity:0;
}

/* TACTICAL CLOCK */
.tactical-clock{
    position:fixed;
    top:20px;
    right:20px;
    font-family:'Share Tech Mono', monospace;
    font-size:0.95rem;
    color:var(--neon);
    border:1px solid rgba(0,255,102,0.4);
    padding:8px 14px;
    background:rgba(0,25,10,0.6);
    box-shadow:0 0 12px rgba(0,255,102,0.25);
    z-index:3;
    letter-spacing:0.05rem;
}

.menu-list{
    animation: fadeInUp 0.8s ease-out 0.8s forwards;
    opacity:0;
}

footer{
    position:fixed;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    font-size:0.75rem;
    opacity:0;
    animation: fadeIn 0.6s ease-out 1.3s forwards;
}

/* ANIMATIONS */
@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:0.6;}
}

/* TACTICAL RADAR */
.tactical-radar{
    position:fixed;
    top:15px;
    left:15px;
    width:140px;
    height:140px;
    border:3px solid var(--neon);
    border-radius:50%;
    background:radial-gradient(circle at center, rgba(0,255,102,0.1) 0%, rgba(0,255,102,0.03) 100%);
    box-shadow:0 0 25px rgba(0,255,102,0.4), inset 0 0 20px rgba(0,255,102,0.15);
    z-index:50;
    overflow:hidden;
}

.radar-grid{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* Crosshair in center */
.radar-grid::before,
.radar-grid::after{
    content:"";
    position:absolute;
    background:var(--neon);
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

.radar-grid::before{
    width:2px;
    height:40px;
}

.radar-grid::after{
    width:40px;
    height:2px;
}

.radar-circle{
    position:absolute;
    border:1px solid rgba(0,255,102,0.4);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

.radar-circle:nth-child(1){width:30px; height:30px; border-style:dashed;}
.radar-circle:nth-child(2){width:60px; height:60px;}
.radar-circle:nth-child(3){width:90px; height:90px; border-style:dotted;}
.radar-circle:nth-child(4){width:120px; height:120px;}

.radar-scan{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:conic-gradient(from 0deg, transparent 0deg, rgba(0,255,102,0.5) 15deg, transparent 30deg);
    animation:radarSpin 4s linear infinite;
    border-radius:50%;
}

.radar-dot{
    position:absolute;
    width:5px;
    height:5px;
    background:var(--neon);
    border-radius:50%;
    box-shadow:0 0 10px var(--neon), 0 0 20px rgba(0,255,102,0.5);
    animation:radarBlink 1.2s ease-in-out infinite;
}

.radar-dot:nth-child(5){
    top:38%;
    left:58%;
}

.radar-dot:nth-child(6){
    top:62%;
    left:45%;
    animation-delay:0.3s;
}

.radar-dot:nth-child(7){
    top:45%;
    left:70%;
    animation-delay:0.6s;
}

.radar-dot:nth-child(8){
    top:72%;
    left:65%;
    animation-delay:0.15s;
}

.radar-dot:nth-child(9){
    top:28%;
    left:32%;
    animation-delay:0.45s;
}

.radar-dot:nth-child(10){
    top:55%;
    left:78%;
    animation-delay:0.9s;
}

@keyframes radarSpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes radarBlink{
    0%, 100%{opacity:1; transform:scale(1);}
    50%{opacity:0.2; transform:scale(0.7);}
}

/* CROSSHAIR */
.cursor-crosshair{
    position:fixed;
    width:24px;
    height:24px;
    border:2px solid var(--neon);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px rgba(0,255,102,0.7);
}

body{ cursor:none; }

.cursor-crosshair::before,
.cursor-crosshair::after{
    content:"";
    position:absolute;
    background:var(--neon);
}

.cursor-crosshair::before{
    width:1px;
    height:30px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.cursor-crosshair::after{
    height:1px;
    width:30px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

/* NIGHT VISION OVERLAY */
.nv-overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(0,255,102,0.3) 0%, rgba(0,255,102,0.15) 50%, rgba(0,10,3,0.8) 100%);
    opacity:0;
    pointer-events:none;
    z-index:60;
    transition:opacity 0.3s ease;
}

body.night-vision .nv-overlay{
    opacity:1;
}

body.night-vision .nv-overlay::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
    animation:nvFlicker 0.15s infinite;
    pointer-events:none;
}

@keyframes nvFlicker{
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100%{opacity:1;}
    20%, 24%, 55%{opacity:0.5;}
}

.nv-toggle{
    position:fixed;
    bottom:80px;
    right:20px;
    padding:8px 12px;
    background:rgba(0,255,102,0.1);
    border:1px solid rgba(0,255,102,0.5);
    color:var(--neon);
    font-family:'Share Tech Mono', monospace;
    font-size:0.75rem;
    cursor:pointer;
    z-index:50;
    transition:all 0.25s ease;
    letter-spacing:0.05rem;
}

.nv-toggle:hover{
    background:rgba(0,255,102,0.25);
    box-shadow:0 0 12px rgba(0,255,102,0.4);
}

.nv-toggle.active{
    background:rgba(0,255,102,0.3);
    box-shadow:0 0 15px rgba(0,255,102,0.6);
    border-color:var(--neon);
}

@media(max-width:540px){
    .cursor-crosshair{display:none;}
    body{cursor:auto;}
}
</style>
</head>

<body>

<div class="bg-photo"></div>
<div class="scanline"></div>
<div class="nv-overlay"></div>
<div class="cursor-crosshair"></div>
<div class="tactical-clock" id="tacticalClock">00:00:00 UTC</div>
<button class="nv-toggle" id="nvToggle">[ NV MODE ]</button>

<!-- Tactical Radar -->
<div class="tactical-radar">
    <div class="radar-grid">
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-dot"></div>
        <div class="radar-dot"></div>
        <div class="radar-dot"></div>
        <div class="radar-dot"></div>
        <div class="radar-dot"></div>
        <div class="radar-dot"></div>
        <div class="radar-scan"></div>
    </div>
</div>

<div class="intro-wrap">

    <div class="header">
        <h1>SYS_K</h1>
        <h2>// TACTICAL OPS &lt;&lt;</h2>
        <p class="version">VERSION 1.0</p>
    </div>

    <div class="menu-box">
        <h3>&gt;&gt; MAIN MENU</h3>
        <div class="menu-list">
            <a class="menu-item" href="index.html">▶ START MISSION</a>
            <a class="menu-item" href="objectives.html">▶ MISSION OBJECTIVES</a>
            <a class="menu-item" href="credits.html">▶ CREDITS</a>
            <button class="menu-item menu-btn" onclick="quitMission()">▶ QUIT</button>
        </div>
    </div>

</div>

<footer>
    Inspired by Project I.G.I | Stealth Portfolio System
</footer>

<audio id="sndHover" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
<audio id="sndClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

<script>
const cursor=document.querySelector('.cursor-crosshair');

// Live tactical clock update
function updateClock(){
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('tacticalClock').textContent = `${hours}:${minutes}:${seconds}`;
}

updateClock();
setInterval(updateClock, 1000);

document.addEventListener('mousemove',e=>{
    cursor.style.left=e.clientX+'px';
    cursor.style.top=e.clientY+'px';
});

// Hover sound and cursor effects
document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('mouseenter', () => {
        const hoverSound = document.getElementById('sndHover');
        hoverSound.volume = 0.3;
        hoverSound.currentTime = 0;
        hoverSound.play().catch(() => {});
        cursor.style.borderColor = '#ff2e2e';
        cursor.style.boxShadow = '0 0 20px rgba(255,46,46,0.9)';
    });
    
    item.addEventListener('mouseleave', () => {
        cursor.style.borderColor = '#00ff66';
        cursor.style.boxShadow = '0 0 10px rgba(0,255,102,0.7)';
    });
    
    item.addEventListener('click', () => {
        const clickSound = document.getElementById('sndClick');
        clickSound.volume = 0.3;
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
    });
});

function quitMission(){
    window.location.href="https://google.com";
}

// Night Vision Toggle (Global - Persistent)
const nvToggle = document.getElementById('nvToggle');

// Check localStorage on load
if(localStorage.getItem('nightVisionMode') === 'true'){
    document.body.classList.add('night-vision');
    nvToggle.classList.add('active');
}

nvToggle.addEventListener('click', () => {
    document.body.classList.toggle('night-vision');
    nvToggle.classList.toggle('active');
    localStorage.setItem('nightVisionMode', document.body.classList.contains('night-vision'));
});

// Toggle NV with 'N' key
document.addEventListener('keydown', (e) => {
    if(e.key.toLowerCase() === 'n'){
        document.body.classList.toggle('night-vision');
        nvToggle.classList.toggle('active');
        localStorage.setItem('nightVisionMode', document.body.classList.contains('night-vision'));
    }
});
</script>

</body>
</html>
