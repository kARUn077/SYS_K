<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM LOADING...</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=TacticalUpdate2" charset="utf-8">
    <style>
        .loading-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 255, 65, 0.2);
            border-top-color: var(--term-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2rem;
        }

        .loading-bar-container {
            width: 400px;
            height: 20px;
            border: 2px solid var(--term-green);
            padding: 2px;
            margin-bottom: 1rem;
        }

        .loading-bar {
            height: 100%;
            background: var(--term-green);
            width: 0%;
            box-shadow: 0 0 10px var(--term-green);
            animation: loadProgress 2s ease-out forwards;
        }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .loading-subtext {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes loadProgress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        /* NIGHT VISION OVERLAY */
        .nv-overlay{
            position:fixed;
            inset:0;
            background:radial-gradient(circle at center, rgba(0,255,102,0.3) 0%, rgba(0,255,102,0.15) 50%, rgba(0,10,3,0.8) 100%);
            opacity:0;
            pointer-events:none;
            z-index:60;
            transition:opacity 0.3s ease;
        }

        body.night-vision .nv-overlay{
            opacity:1;
        }

        body.night-vision .nv-overlay::before{
            content:"";
            position:absolute;
            inset:0;
            background:repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            animation:nvFlicker 0.15s infinite;
            pointer-events:none;
        }

        @keyframes nvFlicker{
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100%{opacity:1;}
            20%, 24%, 55%{opacity:0.5;}
        }

        .nv-toggle{
            position:fixed;
            bottom:20px;
            right:20px;
            padding:8px 12px;
            background:rgba(0,255,102,0.1);
            border:1px solid rgba(0,255,102,0.5);
            color:var(--term-green);
            font-family:'Share Tech Mono', monospace;
            font-size:0.75rem;
            cursor:pointer;
            z-index:50;
            transition:all 0.25s ease;
            letter-spacing:0.05rem;
        }

        .nv-toggle:hover{
            background:rgba(0,255,102,0.25);
            box-shadow:0 0 12px rgba(0,255,102,0.4);
        }

        .nv-toggle.active{
            background:rgba(0,255,102,0.3);
            box-shadow:0 0 15px rgba(0,255,102,0.6);
            border-color:var(--term-green);
        }
    </style>
</head>

<body class="crt">
    <div class="scanlines"></div>
    <div class="nv-overlay"></div>
    <div class="cursor-crosshair"></div>
    <button class="nv-toggle" id="nvToggle">[ NV MODE ]</button>

    <!-- Moving IGI Style Grid for Loading -->
    <div class="video-bg-container" style="background: 
        radial-gradient(circle at 50% 50%, rgba(0, 50, 0, 0.4) 0%, #000 100%),
        linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        animation: bgMoveSmall 10s linear infinite;">
    </div>

    <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-text blink text-green">DECRYPTING CLASSIFIED FILES...</div>
        <div class="loading-subtext" id="loadStatus"> Establishing Secure Uplink...</div>
    </div>

    <!-- Audio Effects -->
    <audio id="sndClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <script src="script.js?v=update5" charset="utf-8"></script>
    <script>
        // Loading sequence simulation
        const statusEl = document.getElementById('loadStatus');
        const tasks = [
            "Bypassing Firewall...",
            "Loading Operative Data...",
            "Mounting Level Assets...",
            "Access Granted."
        ];

        // Change text every 400ms
        tasks.forEach((task, index) => {
            setTimeout(() => {
                statusEl.innerText = task;
            }, index * 500);
        });

        // Redirect logic using URL parameters
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const targetPage = urlParams.get('target') || 'index.html';

            setTimeout(() => {
                window.location.href = targetPage;
            }, 2000); // 2 second fake load
        };
    </script>
</body>

</html>
