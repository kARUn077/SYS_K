<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirtan | TRANSMISSION SUCCESS</title>
    <meta name="description" content="Transmission Successful">
    <link rel="icon" href="logo.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css?v=TacticalUpdate2" charset="utf-8">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            background: #000a03;
            font-family: 'Share Tech Mono', monospace;
            color: var(--term-green);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 1rem;
        }

        .success-container {
            text-align: center;
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: calc(100dvh - 2rem);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-box {
            background: rgba(0, 20, 0, 0.7);
            border: 2px solid var(--term-green);
            padding: clamp(1.5rem, 5vw, 3rem);
            max-width: min(90vw, 600px);
            width: 100%;
            max-height: calc(100dvh - 2rem);
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.3);
            animation: successGlow 2s ease-in-out infinite;
        }

        @keyframes successGlow {
            0%, 100% {
                box-shadow: 0 0 40px rgba(0, 255, 65, 0.3);
                border-color: var(--term-green);
            }
            50% {
                box-shadow: 0 0 60px rgba(0, 255, 65, 0.5);
                border-color: rgba(0, 255, 65, 0.9);
            }
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: iconBounce 1.5s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .success-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.15rem;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        .success-message {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            margin-bottom: 1.5rem;
            color: rgba(0, 255, 65, 0.9);
            letter-spacing: 0.05rem;
        }

        .success-details {
            background: rgba(0, 255, 65, 0.05);
            border: 1px dashed var(--term-green);
            padding: clamp(1rem, 3vw, 1.5rem);
            margin: clamp(1.5rem, 4vw, 2rem) 0;
            font-size: clamp(0.8rem, 2vw, 0.95rem);
        }

        .success-details p {
            margin: 0.5rem 0;
        }

        .status-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0;
            padding: 0.5rem;
            border-bottom: 1px dotted rgba(0, 255, 65, 0.3);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .status-line:last-child {
            border-bottom: none;
        }

        .status-label {
            color: rgba(0, 255, 65, 0.7);
            font-weight: normal;
        }

        .status-value {
            color: var(--term-green);
            font-weight: bold;
        }

        .back-button {
            display: inline-block;
            margin-top: clamp(1.5rem, 4vw, 2rem);
            padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(1.2rem, 3vw, 2rem);
            background: rgba(0, 255, 65, 0.1);
            border: 2px solid var(--term-green);
            color: var(--term-green);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.08rem;
        }

        .back-button:hover {
            background: var(--term-green);
            color: #000a03;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.7);
            transform: scale(1.05);
        }

        /* NIGHT VISION OVERLAY */
        .nv-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0, 255, 102, 0.3) 0%, rgba(0, 255, 102, 0.15) 50%, rgba(0, 10, 3, 0.8) 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 60;
            transition: opacity 0.3s ease;
        }

        body.night-vision .nv-overlay {
            opacity: 1;
        }

        body.night-vision .nv-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15) 0px, rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px);
            animation: nvFlicker 0.15s infinite;
            pointer-events: none;
        }

        @keyframes nvFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.5; }
        }

        .nv-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 12px;
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid rgba(0, 255, 102, 0.5);
            color: var(--term-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            z-index: 50;
            transition: all 0.25s ease;
            letter-spacing: 0.05rem;
        }

        .nv-toggle:hover {
            background: rgba(0, 255, 102, 0.25);
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.4);
        }

        .nv-toggle.active {
            background: rgba(0, 255, 102, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
            border-color: var(--term-green);
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 480px) {
            body {
                min-height: 100dvh;
                overflow-y: auto;
                padding: 0.75rem;
            }

            .success-icon {
                font-size: 3rem;
                margin-bottom: 1rem;
            }

            .success-container,
            .success-box {
                min-height: auto;
                max-height: none;
            }

            .status-line {
                flex-direction: column;
                align-items: flex-start;
            }

            .status-value {
                align-self: flex-end;
            }
        }
    </style>
</head>

<body class="crt">

    <!-- Screen Scanline Overlay -->
    <div class="scanlines"></div>
    <div class="nv-overlay"></div>
    <button class="nv-toggle" id="nvToggle">[ NV MODE ]</button>

    <!-- Background Video -->
    <div class="video-bg-container">
        <video autoplay muted loop id="bgVideo" class="covert-video">
            <source src="https://videos.pexels.com/video-files/3156/3156-uhd_2560_1440_30fps.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Custom Crosshair -->
    <div class="cursor-crosshair"></div>

    <!-- Success Container -->
    <div class="success-container">
        <div class="success-box">
            <div class="success-icon">✓</div>
            <h1 class="success-title">TRANSMISSION SUCCESSFUL</h1>
            <p class="success-message">Your message has been received and logged</p>

            <div class="success-details">
                <div class="status-line">
                    <span class="status-label">SIGNAL STATUS:</span>
                    <span class="status-value">[ CLEAR ]</span>
                </div>
                <div class="status-line">
                    <span class="status-label">ENCRYPTION PROTOCOL:</span>
                    <span class="status-value">[ VERIFIED ]</span>
                </div>
                <div class="status-line">
                    <span class="status-label">DELIVERY CONFIRMATION:</span>
                    <span class="status-value">[ SUCCESSFUL ]</span>
                </div>
                <div class="status-line">
                    <span class="status-label">RESPONSE TIME:</span>
                    <span class="status-value">[ 24HRS MAX ]</span>
                </div>
            </div>

            <p class="success-message">Thank you for reaching out. I'll get back to you soon.</p>

            <a href="comms.html" class="back-button">>> RETURN TO COMMS</a>
        </div>
    </div>

    <!-- Audio -->
    <audio id="sndHover" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sndClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <script src="script.js?v=update4" charset="utf-8"></script>

    <script>
        // Hover effect on back button
        const backButton = document.querySelector('.back-button');
        backButton.addEventListener('mouseenter', () => {
            const hoverSound = document.getElementById('sndHover');
            hoverSound.volume = 0.3;
            hoverSound.currentTime = 0;
            hoverSound.play().catch(() => {});
        });

        backButton.addEventListener('click', () => {
            const clickSound = document.getElementById('sndClick');
            clickSound.volume = 0.3;
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
        });
    </script>

</body>

</html>
